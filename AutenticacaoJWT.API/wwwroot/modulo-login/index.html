<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Módulo de Login — AutenticacaoJWT</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#f1f5f9; --muted:#94a3b8; --error:#f87171; --ok:#4ade80; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:system-ui,sans-serif; background:linear-gradient(160deg,#0f172a,#1e3a5f); color:var(--text); padding:1rem; }
    .layout { max-width:900px; margin:0 auto; display:grid; gap:1rem; }
    .card { background:var(--card); border-radius:12px; padding:1.5rem; box-shadow:0 20px 50px rgba(0,0,0,.35); }
    h1 { margin:0 0 .25rem; font-size:1.35rem; }
    .subtitle { color:var(--muted); font-size:.9rem; margin-bottom:1rem; }
    label { display:block; font-size:.85rem; margin-bottom:.35rem; color:var(--muted); }
    input { width:100%; padding:.65rem .75rem; margin-bottom:.75rem; border:1px solid #334155; border-radius:8px; background:#0f172a; color:var(--text); }
    .tabs { display:flex; gap:.5rem; margin-bottom:1rem; }
    .tabs button { flex:1; padding:.5rem; border:1px solid #334155; background:transparent; color:var(--muted); border-radius:8px; cursor:pointer; }
    .tabs button.active { background:var(--accent); color:#0f172a; border-color:var(--accent); font-weight:600; }
    .btn { width:100%; padding:.75rem; border:none; border-radius:8px; background:var(--accent); color:#0f172a; font-weight:700; cursor:pointer; margin-top:.25rem; }
    .btn.secondary { background:#334155; color:var(--text); margin-top:.5rem; }
    .hidden { display:none; }
    #message { margin-top:.75rem; font-size:.85rem; min-height:1.2rem; }
    #message.error { color:var(--error); }
    #message.ok { color:var(--ok); }
    .profile { display:grid; gap:.35rem; font-size:.9rem; }
    .profile strong { color:var(--accent); }
    table { width:100%; border-collapse:collapse; font-size:.85rem; margin-top:.5rem; }
    th, td { text-align:left; padding:.5rem; border-bottom:1px solid #334155; }
    .hint { font-size:.75rem; color:var(--muted); margin-bottom:.75rem; }
    .copyright { text-align:center; font-size:.75rem; color:var(--muted); margin-top:1.5rem; padding-top:1rem; border-top:1px solid #334155; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="card" id="authCard">
      <h1>Módulo de Login</h1>
      <p class="subtitle">JWT + refresh token — pronto para integrar</p>
      <div class="tabs">
        <button type="button" id="tabLogin" class="active">Entrar</button>
        <button type="button" id="tabRegister">Cadastrar</button>
      </div>
      <form id="authForm">
        <div id="nameField" class="hidden">
          <label for="name">Nome</label>
          <input id="name" type="text" maxlength="50" />
        </div>
        <label for="email">E-mail</label>
        <input id="email" type="email" required />
        <label for="password">Senha</label>
        <input id="password" type="password" required />
        <p class="hint" id="passwordHint">Cadastro: mín. 8 caracteres, maiúscula, minúscula e número.</p>
        <button type="submit" class="btn" id="submitBtn">Entrar</button>
      </form>
      <div id="message" role="status"></div>
    </div>

    <div class="card hidden" id="dashboardCard">
      <h1>Área autenticada</h1>
      <div class="profile" id="profile"></div>
      <button type="button" class="btn secondary" id="btnRefresh">Renovar token</button>
      <button type="button" class="btn secondary" id="btnLogout">Sair</button>
      <div id="usersSection" class="hidden">
        <h2 style="font-size:1rem;margin-top:1.25rem;">Usuários (admin)</h2>
        <div id="usersTable"></div>
      </div>
    </div>

    <p class="copyright">© Elias Ferreira. Todos os direitos reservados.</p>
  </div>

  <script>
    const apiBase = window.location.origin;
    const authCard = document.getElementById('authCard');
    const dashboardCard = document.getElementById('dashboardCard');
    const message = document.getElementById('message');
    const nameField = document.getElementById('nameField');
    const passwordHint = document.getElementById('passwordHint');
    let mode = 'login';

    function getTokens() {
      return {
        token: localStorage.getItem('jwt_token'),
        refresh: localStorage.getItem('jwt_refresh')
      };
    }

    function saveTokens(data) {
      localStorage.setItem('jwt_token', data.token);
      localStorage.setItem('jwt_refresh', data.refreshToken);
      localStorage.setItem('jwt_expires', data.expiresAt);
    }

    function clearTokens() {
      ['jwt_token','jwt_refresh','jwt_expires'].forEach(k => localStorage.removeItem(k));
    }

    function authHeaders() {
      const { token } = getTokens();
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    function setMode(next) {
      mode = next;
      const isRegister = mode === 'register';
      nameField.classList.toggle('hidden', !isRegister);
      document.getElementById('submitBtn').textContent = isRegister ? 'Cadastrar' : 'Entrar';
      document.getElementById('tabLogin').classList.toggle('active', !isRegister);
      document.getElementById('tabRegister').classList.toggle('active', isRegister);
      passwordHint.classList.toggle('hidden', !isRegister);
      message.textContent = '';
      message.className = '';
    }

    document.getElementById('tabLogin').onclick = () => setMode('login');
    document.getElementById('tabRegister').onclick = () => setMode('register');

    async function showDashboard() {
      authCard.classList.add('hidden');
      dashboardCard.classList.remove('hidden');
      try {
        const res = await fetch(`${apiBase}/api/Login/me`, { headers: authHeaders() });
        const me = await res.json();
        if (!res.ok) throw new Error(me.message || 'Sessão inválida');
        document.getElementById('profile').innerHTML = `
          <div><strong>Nome:</strong> ${me.name}</div>
          <div><strong>E-mail:</strong> ${me.email}</div>
          <div><strong>Admin:</strong> ${me.isAdmin ? 'Sim' : 'Não'}</div>`;
        if (me.isAdmin) await loadUsers();
      } catch {
        clearTokens();
        location.reload();
      }
    }

    async function loadUsers() {
      const res = await fetch(`${apiBase}/api/User/Users?pageNumber=1&pageSize=20`, { headers: authHeaders() });
      const body = await res.json();
      if (!res.ok) return;
      document.getElementById('usersSection').classList.remove('hidden');
      const rows = (body.data || []).map(u =>
        `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.isAdmin ? 'Sim' : 'Não'}</td></tr>`).join('');
      document.getElementById('usersTable').innerHTML =
        `<table><thead><tr><th>Id</th><th>Nome</th><th>E-mail</th><th>Admin</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    document.getElementById('authForm').onsubmit = async (e) => {
      e.preventDefault();
      message.textContent = 'Processando...';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const url = mode === 'login' ? `${apiBase}/api/Login/login` : `${apiBase}/api/Login/register`;
      const body = mode === 'login'
        ? { email, password }
        : { name: document.getElementById('name').value.trim(), email, password };

      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = data.message || (data.errors && data.errors[0]?.errorMessage) || 'Falha na autenticação.';
        message.textContent = err;
        message.className = 'error';
        return;
      }
      saveTokens(data);
      message.textContent = '';
      await showDashboard();
    };

    document.getElementById('btnRefresh').onclick = async () => {
      const refresh = localStorage.getItem('jwt_refresh');
      const res = await fetch(`${apiBase}/api/Login/refresh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken: refresh })
      });
      const data = await res.json();
      if (res.ok) { saveTokens(data); message.textContent = 'Token renovado.'; message.className = 'ok'; }
    };

    document.getElementById('btnLogout').onclick = async () => {
      const refresh = localStorage.getItem('jwt_refresh');
      await fetch(`${apiBase}/api/Login/logout`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ refreshToken: refresh })
      }).catch(() => {});
      clearTokens();
      location.reload();
    };

    if (getTokens().token) showDashboard();
  </script>
</body>
</html>
